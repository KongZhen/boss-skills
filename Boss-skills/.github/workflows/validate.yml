name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'schema/**'
      - 'tools/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'schema/**'
      - 'tools/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate all boss skills

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "pyyaml>=6.0,<7" "jsonschema>=4.17,<5"

      - name: Run skill validation
        run: python tools/validate_skills.py
