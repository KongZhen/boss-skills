name: "Report a Problem"
description: "Report a bug, tone issue, or content concern"
title: "[Problem] <brief description>"
labels: ["bug"]
body:
  - type: dropdown
    id: problem-type
    attributes:
      label: Problem Type
      options:
        - Content crosses a line (tone/safety issue)
        - Validation tool bug
        - Schema issue
        - Documentation error
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What's the problem?"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What should happen instead?"
